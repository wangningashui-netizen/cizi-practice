<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>错字听写练习本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#fdf8f0;--paper:#fffef9;--ink:#2c2416;--ink2:#5a4e3a;--ink3:#9a8b72;--red:#c0392b;--red-light:#fdf0ee;--green:#27774a;--green-light:#eef7f1;--amber:#b8720a;--amber-light:#fef8ec;--blue:#1a5f8a;--blue-light:#edf4fa;--border:#e0d5c0;--shadow:rgba(44,36,22,0.07);--radius:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;background-image:repeating-linear-gradient(0deg,transparent,transparent 31px,#e8dfc8 31px,#e8dfc8 32px);background-attachment:fixed}
.topbar{background:var(--paper);border-bottom:2px solid var(--border);padding:0 20px;display:flex;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px var(--shadow)}
.topbar-title{font-family:'ZCOOL XiaoWei',serif;font-size:22px;color:var(--ink);padding:14px 0;margin-right:auto;letter-spacing:2px}
.topbar-title span{color:var(--red)}
.tab-btn{font-family:'Noto Sans SC',sans-serif;font-size:14px;color:var(--ink3);background:none;border:none;padding:18px 18px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .2s,border-color .2s;white-space:nowrap}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red);font-weight:700}
.tab-btn:hover:not(.active){color:var(--ink2)}
.main{max-width:720px;margin:0 auto;padding:24px 16px 60px}
.card{background:var(--paper);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:0 2px 8px var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--ink3);letter-spacing:1px;margin-bottom:14px}
input[type=text],textarea,select{font-family:'Noto Sans SC',sans-serif;font-size:15px;color:var(--ink);background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;width:100%;outline:none;transition:border-color .2s}
input[type=text]:focus,textarea:focus{border-color:var(--amber)}
.input-row{display:flex;gap:8px;align-items:flex-start}
.input-row input{flex:1}
.btn{font-family:'Noto Sans SC',sans-serif;font-size:14px;font-weight:700;border:none;border-radius:8px;padding:10px 18px;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{opacity:.88}
.btn-outline{background:transparent;color:var(--ink2);border:1.5px solid var(--border)}
.btn-outline:hover{background:var(--bg)}
.btn-sm{font-size:12px;padding:6px 12px;border-radius:6px}
.btn-icon{padding:7px 10px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--paper);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center}
.stat-num{font-size:26px;font-weight:700;font-family:'ZCOOL XiaoWei',serif}
.stat-label{font-size:11px;color:var(--ink3);margin-top:2px}
.stat-red .stat-num{color:var(--red)}.stat-green .stat-num{color:var(--green)}.stat-amber .stat-num{color:var(--amber)}.stat-blue .stat-num{color:var(--blue)}
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.char-item{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:3px;position:relative;transition:border-color .2s}
.char-item:hover{border-color:var(--amber)}
.char-item.graduated{opacity:.45}
.char-main{font-size:28px;font-family:'ZCOOL XiaoWei',serif;color:var(--ink)}
.char-item.graduated .char-main{color:var(--green)}
.char-words{font-size:11px;color:var(--blue);line-height:1.6}
.char-meta{font-size:10px;color:var(--ink3);margin-top:2px}
.char-badge{position:absolute;top:6px;right:6px;font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px}
.badge-new{background:var(--red-light);color:var(--red)}.badge-learning{background:var(--amber-light);color:var(--amber)}.badge-good{background:var(--green-light);color:var(--green)}.badge-done{background:#e8f4e8;color:#27774a}
.char-actions{display:flex;gap:4px;margin-top:4px}
.char-progress{height:3px;border-radius:2px;background:var(--border);margin-top:4px;overflow:hidden}
.char-progress-bar{height:100%;border-radius:2px;background:var(--green);transition:width .4s}
.quiz-card{text-align:center;padding:32px 20px}
.quiz-word-display{font-size:54px;font-family:'ZCOOL XiaoWei',serif;letter-spacing:8px;color:var(--ink);margin:16px 0 6px;min-height:72px;display:flex;align-items:center;justify-content:center;gap:8px}
.quiz-hint{font-size:13px;color:var(--ink3);margin-bottom:24px;min-height:20px}
.quiz-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.quiz-result{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.result-btn-correct{background:var(--green-light);color:var(--green);border:2px solid var(--green);font-size:15px;padding:12px 28px;border-radius:10px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-weight:700}
.result-btn-wrong{background:var(--red-light);color:var(--red);border:2px solid var(--red);font-size:15px;padding:12px 28px;border-radius:10px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-weight:700}
.result-btn-correct:hover{background:#d4f0e0}.result-btn-wrong:hover{background:#fce0dc}
.session-progress{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.session-dot{width:10px;height:10px;border-radius:50%;background:var(--border)}
.session-dot.correct{background:var(--green)}.session-dot.wrong{background:var(--red)}.session-dot.current{background:var(--amber);box-shadow:0 0 0 3px var(--amber-light)}
.quiz-count{font-size:13px;color:var(--ink3);margin-bottom:4px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.summary-item{background:var(--bg);border-radius:8px;padding:12px;text-align:center}
.summary-item .num{font-size:28px;font-weight:700}.summary-item .lbl{font-size:12px;color:var(--ink3)}
.history-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.history-item:last-child{border-bottom:none}
.history-char{font-size:22px;font-family:'ZCOOL XiaoWei',serif;min-width:32px}
.history-word{flex:1;color:var(--ink2)}.history-time{color:var(--ink3);font-size:11px}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:4px}
.tag-c{background:var(--green-light);color:var(--green)}.tag-w{background:var(--red-light);color:var(--red)}
.empty{text-align:center;padding:40px 20px;color:var(--ink3);font-size:14px;line-height:2}
.empty .big{font-size:40px;margin-bottom:8px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,36,22,.4);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--paper);border-radius:14px;padding:24px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(44,36,22,.18)}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.form-label{font-size:12px;color:var(--ink3);margin-bottom:4px;font-weight:700;letter-spacing:.5px}
.form-group{margin-bottom:12px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;font-size:13px;padding:10px 20px;border-radius:30px;z-index:9999;transition:transform .3s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.page{display:none}.page.active{display:block}
.divider{height:1px;background:var(--border);margin:14px 0}
.graduated-toggle{font-size:12px;color:var(--ink3);cursor:pointer;display:inline-flex;align-items:center;gap:4px;padding:4px 0}
.word-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.word-chip{font-size:11px;background:var(--blue-light);color:var(--blue);border-radius:4px;padding:1px 6px;cursor:default;border:1px solid #c2d8ea}
.word-chip.remove{cursor:pointer;background:var(--red-light);color:var(--red);border-color:#f0b8b0}
.word-chip.remove:hover{background:#fce0dc}
.session-config{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.session-config label{font-size:13px;color:var(--ink2)}
.session-config select{width:auto;font-size:13px;padding:7px 10px}
@media(max-width:500px){.topbar-title{font-size:18px}.tab-btn{padding:16px 11px;font-size:13px}.quiz-word-display{font-size:40px}.char-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">错字<span>练习本</span></div>
  <button class="tab-btn active" onclick="showPage('words',this)">📚 错字库</button>
  <button class="tab-btn" onclick="showPage('quiz',this)">✍️ 听写</button>
  <button class="tab-btn" onclick="showPage('history',this)">📋 记录</button>
</div>
<div class="toast" id="toast"></div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal-box">
    <div class="modal-title">➕ 录入错字</div>
    <div class="form-group">
      <div class="form-label">错字（可一次输入多个，空格或逗号隔开）</div>
      <input type="text" id="addChars" placeholder="例：蛋 篮 瓣">
    </div>
    <div class="form-group">
      <div class="form-label">来源备注（可选）</div>
      <input type="text" id="addSource" placeholder="例：语文作业 / 老师批改">
    </div>
    <div class="form-group">
      <div class="form-label">手动补充词语（可选，空格隔开）</div>
      <input type="text" id="addWords" placeholder="系统会自动匹配，这里可额外追加">
    </div>
    <div id="previewArea" style="display:none;">
      <div class="divider"></div>
      <div class="form-label">自动匹配词语预览（共 <span id="previewCount">0</span> 条）</div>
      <div id="previewWords" class="word-chips" style="margin-bottom:4px;"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveChars()">保存</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-title">✏️ 编辑词语</div>
    <div class="form-group">
      <div class="form-label">当前词语（点击删除）</div>
      <div id="editWordChips" class="word-chips" style="min-height:32px;margin-bottom:8px;"></div>
    </div>
    <div class="form-group">
      <div class="form-label">添加词语</div>
      <div class="input-row">
        <input type="text" id="editNewWord" placeholder="输入词语" onkeydown="if(event.key==='Enter')addEditWord()">
        <button class="btn btn-outline btn-sm" onclick="addEditWord()">添加</button>
      </div>
    </div>
    <input type="hidden" id="editCharId">
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeEditModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- PAGE: WORDS -->
<div class="main page active" id="page-words">
  <div class="stats-row">
    <div class="stat-card stat-red"><div class="stat-num" id="stat-total">0</div><div class="stat-label">总错字数</div></div>
    <div class="stat-card stat-amber"><div class="stat-num" id="stat-active">0</div><div class="stat-label">练习中</div></div>
    <div class="stat-card stat-green"><div class="stat-num" id="stat-grad">0</div><div class="stat-label">已掌握</div></div>
    <div class="stat-card stat-blue"><div class="stat-num" id="stat-sessions">0</div><div class="stat-label">听写次数</div></div>
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div class="card-title" style="margin-bottom:0;">错字库</div>
      <button class="btn btn-primary btn-sm" onclick="openAddModal()">＋ 录入错字</button>
    </div>
    <div id="charGrid" class="char-grid"></div>
    <div id="emptyWords" class="empty" style="display:none;"><div class="big">📖</div>还没有错字记录<br>点击「录入错字」开始吧</div>
    <div class="divider" id="gradDivider" style="display:none;"></div>
    <div id="graduatedSection" style="display:none;">
      <div class="graduated-toggle" onclick="toggleGraduated(this)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        已掌握的字（<span id="gradCount">0</span> 个）
      </div>
      <div id="graduatedGrid" class="char-grid" style="display:none;margin-top:8px;"></div>
    </div>
  </div>
</div>

<!-- PAGE: QUIZ -->
<div class="main page" id="page-quiz">
  <div id="quizSetup">
    <div class="card" id="quizSetupCard">
      <div class="card-title">听写设置</div>
      <div class="session-config">
        <label>本次题数：</label>
        <select id="quizCount"><option value="5">5 题</option><option value="8" selected>8 题</option><option value="10">10 题</option><option value="15">15 题</option><option value="0">全部</option></select>
        <label>出题模式：</label>
        <select id="quizMode"><option value="weighted">智能权重（推荐）</option><option value="random">随机</option><option value="worst">优先最弱项</option></select>
      </div>
      <div style="font-size:12px;color:var(--ink3);margin-bottom:16px;">智能权重：新字、答错的字优先出题；连续3次正确自动「毕业」退出练习池</div>
      <button class="btn btn-primary" style="width:100%;font-size:16px;padding:13px;" onclick="startQuiz()">开始听写 ✍️</button>
    </div>
    <div id="quizEmptyHint" class="empty" style="display:none;"><div class="big">📚</div>练习池为空<br>请先去「错字库」录入错字</div>
  </div>
  <div id="quizSession" style="display:none;">
    <div class="card quiz-card">
      <div class="quiz-count" id="quizCountDisplay"></div>
      <div class="session-progress" id="sessionProgress"></div>
      <div class="quiz-hint" id="quizHint"></div>
      <div class="quiz-word-display" id="quizWordDisplay">—</div>
      <div style="font-size:12px;color:var(--ink3);margin-bottom:16px;" id="quizSubHint"></div>
      <div class="quiz-actions" id="quizActions"></div>
      <div class="quiz-result" id="quizResult" style="display:none;">
        <button class="result-btn-correct" onclick="markResult(true)">✓ 写对了</button>
        <button class="result-btn-wrong" onclick="markResult(false)">✗ 写错了</button>
      </div>
    </div>
  </div>
  <div id="quizSummary" style="display:none;">
    <div class="card">
      <div class="card-title">本次听写结果</div>
      <div class="summary-grid">
        <div class="summary-item"><div class="num" style="color:var(--green)" id="sumCorrect">0</div><div class="lbl">写对</div></div>
        <div class="summary-item"><div class="num" style="color:var(--red)" id="sumWrong">0</div><div class="lbl">写错</div></div>
      </div>
      <div id="sumDetails"></div>
      <div style="display:flex;gap:8px;margin-top:16px;">
        <button class="btn btn-primary" style="flex:1;" onclick="startQuiz()">再来一次</button>
        <button class="btn btn-outline" style="flex:1;" onclick="backToSetup()">返回设置</button>
      </div>
    </div>
  </div>
</div>

<!-- PAGE: HISTORY -->
<div class="main page" id="page-history">
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div class="card-title" style="margin-bottom:0;">听写历史</div>
      <button class="btn btn-outline btn-sm" onclick="clearHistory()">清空</button>
    </div>
    <div id="historyList"></div>
    <div id="historyEmpty" class="empty" style="display:none;"><div class="big">📋</div>还没有听写记录</div>
  </div>
</div>

<script>

// 格式：每行多个词，空格分隔

// 去重
const WORDS = [...new Set(WORD_BANK)];

function findWordsFor(ch) {
  return WORDS.filter(w => w.includes(ch));
}

// ============================================================
//  数据
// ============================================================
const SK = 'cuzipractice_v3';
function load() { try { return JSON.parse(localStorage.getItem(SK)) || mk(); } catch(e) { return mk(); } }
function save(d) { localStorage.setItem(SK, JSON.stringify(d)); }
function mk() { return { chars:[], history:[], totalSessions:0 }; }
let data = load();

function mkChar(ch, src) {
  const ws = findWordsFor(ch);
  return { id: Date.now()+'_'+Math.random().toString(36).slice(2), ch, source:src||'',
    words: shuffle(ws).slice(0,15), weight:10, correct:0, wrong:0, streak:0,
    graduated:false, addedAt:new Date().toISOString() };
}

function badge(c) {
  if(c.graduated) return ['badge-done','已掌握'];
  if(c.streak>=2) return ['badge-good','较熟'];
  if(c.correct+c.wrong===0) return ['badge-new','新字'];
  if(c.wrong>c.correct) return ['badge-learning','需加强'];
  return ['badge-learning','练习中'];
}

function updW(c) {
  if(c.graduated){c.weight=0;return;}
  c.weight = Math.max(1, 10 + c.wrong*4 - c.correct*2 - c.streak*3);
}

function checkGrad(c) {
  if(c.streak>=3 && !c.graduated){c.graduated=true;c.weight=0;return true;}
  return false;
}

// ============================================================
//  错字库页
// ============================================================
function renderWords() {
  const active = data.chars.filter(c=>!c.graduated);
  const grad = data.chars.filter(c=>c.graduated);
  document.getElementById('stat-total').textContent = data.chars.length;
  document.getElementById('stat-active').textContent = active.length;
  document.getElementById('stat-grad').textContent = grad.length;
  document.getElementById('stat-sessions').textContent = data.totalSessions;

  const g = document.getElementById('charGrid');
  const e = document.getElementById('emptyWords');
  if(!active.length){g.innerHTML='';e.style.display='';}
  else{e.style.display='none';g.innerHTML=active.map(charHTML).join('');}

  const gs = document.getElementById('graduatedSection');
  const gd = document.getElementById('gradDivider');
  if(grad.length){
    gs.style.display='';gd.style.display='';
    document.getElementById('gradCount').textContent=grad.length;
    document.getElementById('graduatedGrid').innerHTML=grad.map(charHTML).join('');
  } else {gs.style.display='none';gd.style.display='none';}
}

function charHTML(c) {
  const [bc,bt]=badge(c);
  const prog=Math.min(100,Math.round((c.streak/3)*100));
  const prev=c.words.slice(0,3).join('、')||(c.words.length?c.words.join('、'):'（暂无词语，可手动添加）');
  const id=c.id;
  return `<div class="char-item${c.graduated?' graduated':''}">
    <span class="char-badge ${bc}">${bt}</span>
    <div class="char-main">${c.ch}</div>
    <div class="char-words">${prev}</div>
    <div class="char-meta">对${c.correct} 错${c.wrong} · ${c.words.length}条词${c.source?' · '+c.source:''}</div>
    <div class="char-progress"><div class="char-progress-bar" style="width:${prog}%"></div></div>
    <div class="char-actions">
      <button class="btn btn-outline btn-sm btn-icon" onclick="openEdit('${id}')">✏️</button>
      ${c.graduated
        ?`<button class="btn btn-outline btn-sm" onclick="ungrad('${id}')">重练</button>`
        :`<button class="btn btn-outline btn-sm" onclick="manGrad('${id}')">✓掌握</button>`}
      <button class="btn btn-outline btn-sm btn-icon" onclick="delChar('${id}')">🗑</button>
    </div>
  </div>`;
}

function toggleGraduated(el) {
  const g=document.getElementById('graduatedGrid');
  const show=g.style.display==='none';
  g.style.display=show?'':'none';
  el.querySelector('svg').style.transform=show?'rotate(180deg)':'';
}
function delChar(id){
  if(!confirm('确认删除？'))return;
  data.chars=data.chars.filter(c=>c.id!==id);save(data);renderWords();toast('已删除');
}
function manGrad(id){
  const c=data.chars.find(c=>c.id===id);
  if(c){c.graduated=true;c.weight=0;save(data);renderWords();toast('已标记为掌握 🎉');}
}
function ungrad(id){
  const c=data.chars.find(c=>c.id===id);
  if(c){c.graduated=false;c.streak=0;updW(c);save(data);renderWords();toast('已移回练习中');}
}

// ============================================================
//  录入弹窗
// ============================================================
function openAddModal(){
  ['addChars','addSource','addWords'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('previewArea').style.display='none';
  document.getElementById('addModal').classList.add('open');
  setTimeout(()=>document.getElementById('addChars').focus(),80);
}
function closeModal(){document.getElementById('addModal').classList.remove('open');}

document.getElementById('addChars').addEventListener('input',function(){
  const chars=exChars(this.value);
  if(!chars.length){document.getElementById('previewArea').style.display='none';return;}
  const all=new Set();
  chars.forEach(ch=>findWordsFor(ch).forEach(w=>all.add(w)));
  const prev=[...all].slice(0,18);
  if(prev.length){
    document.getElementById('previewArea').style.display='';
    document.getElementById('previewCount').textContent=all.size;
    document.getElementById('previewWords').innerHTML=prev.map(w=>`<span class="word-chip">${w}</span>`).join('');
  } else {document.getElementById('previewArea').style.display='none';}
});

function exChars(raw){
  return [...new Set(raw.replace(/[\s,，、。！？]+/g,'').split('').filter(c=>/[\u4e00-\u9fa5]/.test(c)))];
}

function saveChars(){
  const chars=exChars(document.getElementById('addChars').value);
  const src=document.getElementById('addSource').value.trim();
  const mw=document.getElementById('addWords').value.trim().split(/[\s,，、]+/).filter(Boolean);
  if(!chars.length){toast('请输入汉字');return;}
  const ex=new Set(data.chars.map(c=>c.ch));
  let added=0,skipped=[];
  for(const ch of chars){
    if(ex.has(ch)){skipped.push(ch);continue;}
    const c=mkChar(ch,src);
    const mwFor=mw.filter(w=>w.includes(ch));
    c.words=[...new Set([...mwFor,...c.words])].slice(0,18);
    data.chars.push(c);added++;
  }
  save(data);closeModal();renderWords();
  if(added>0) toast(`已录入 ${added} 个错字 📝${skipped.length?'，'+skipped.join('')+'已存在跳过':''}`);
  else toast('这些字已在错字库中');
}

// ============================================================
//  编辑词语
// ============================================================
let eWds=[];
function openEdit(id){
  const c=data.chars.find(c=>c.id===id);if(!c)return;
  eWds=[...c.words];
  document.getElementById('editCharId').value=id;
  document.getElementById('editNewWord').value='';
  renderEC();document.getElementById('editModal').classList.add('open');
}
function renderEC(){
  document.getElementById('editWordChips').innerHTML=eWds.map((w,i)=>
    `<span class="word-chip remove" onclick="rmEW(${i})">${w} ×</span>`).join('');
}
function rmEW(i){eWds.splice(i,1);renderEC();}
function addEditWord(){
  const v=document.getElementById('editNewWord').value.trim();
  if(!v)return;
  if(!eWds.includes(v))eWds.push(v);
  document.getElementById('editNewWord').value='';renderEC();
}
function closeEditModal(){document.getElementById('editModal').classList.remove('open');}
function saveEdit(){
  const id=document.getElementById('editCharId').value;
  const c=data.chars.find(c=>c.id===id);
  if(c){c.words=eWds;save(data);renderWords();toast('词语已保存');}
  closeEditModal();
}

// ============================================================
//  听写
// ============================================================
let qQ=[],qI=0,qR=[],cur=null,curWord='';

function startQuiz(){
  const active=data.chars.filter(c=>!c.graduated);
  if(!active.length){
    document.getElementById('quizEmptyHint').style.display='';
    document.getElementById('quizSetupCard').style.display='none';return;
  }
  document.getElementById('quizEmptyHint').style.display='none';
  document.getElementById('quizSetupCard').style.display='';

  const mode=document.getElementById('quizMode').value;
  const cv=parseInt(document.getElementById('quizCount').value)||active.length;
  const n=Math.min(cv||active.length,active.length);

  if(mode==='weighted') qQ=wSample(active,n);
  else if(mode==='worst') qQ=[...active].sort((a,b)=>(b.wrong-b.correct)-(a.wrong-a.correct)).slice(0,n);
  else qQ=shuffle([...active]).slice(0,n);

  qI=0;qR=[];data.totalSessions++;save(data);
  document.getElementById('quizSetup').style.display='none';
  document.getElementById('quizSummary').style.display='none';
  document.getElementById('quizSession').style.display='';
  showQ();
}

function wSample(pool,n){
  const arr=pool.map(c=>({...c,_w:Math.max(1,c.weight)}));
  const res=[];n=Math.min(n,arr.length);
  for(let i=0;i<n;i++){
    const tot=arr.reduce((s,c)=>s+c._w,0);let r=Math.random()*tot;
    for(let j=0;j<arr.length;j++){r-=arr[j]._w;if(r<=0){res.push(arr[j]);arr.splice(j,1);break;}}
  }
  return res;
}

function showQ(){
  const c=qQ[qI];cur=c;
  const total=qQ.length;
  document.getElementById('quizCountDisplay').textContent=`第 ${qI+1} 题 / 共 ${total} 题`;
  document.getElementById('sessionProgress').innerHTML=
    Array.from({length:total},(_,i)=>{
      let cl='session-dot';
      if(i<qR.length)cl+=qR[i]===true?' correct':qR[i]===false?' wrong':'';
      else if(i===qI)cl+=' current';
      return `<div class="${cl}"></div>`;
    }).join('');

  curWord=pickW(c);
  document.getElementById('quizHint').textContent=`请听写包含「${c.ch}」的词语`;
  document.getElementById('quizSubHint').textContent=`对${c.correct} 错${c.wrong}，连续正确${c.streak}次`;
  document.getElementById('quizWordDisplay').innerHTML=`<span id="wRev" style="opacity:0">${wHTML(curWord,c.ch)}</span>`;
  document.getElementById('quizActions').style.display='';
  document.getElementById('quizResult').style.display='none';
  document.getElementById('quizActions').innerHTML=`
    <button class="btn btn-primary" style="font-size:15px;padding:12px 32px;" onclick="reveal()">👁 显示词语</button>
    <button class="btn btn-outline" onclick="skip()">跳过</button>`;
}

function wHTML(w,ch){
  return w.split('').map(c=>c===ch?`<span style="border-bottom:3px solid var(--red);color:var(--red);font-weight:700;">${c}</span>`:c).join('');
}
function pickW(c){
  return (c.words&&c.words.length)?c.words[Math.floor(Math.random()*c.words.length)]:c.ch;
}
function reveal(){
  const el=document.getElementById('wRev');
  if(el){el.style.opacity='1';el.style.transition='opacity .3s';}
  document.getElementById('quizActions').style.display='none';
  document.getElementById('quizResult').style.display='';
}
function skip(){qR.push(null);nextQ();}
function markResult(ok){
  const real=data.chars.find(c=>c.id===cur.id);
  if(real){
    if(ok){real.correct++;real.streak++;}else{real.wrong++;real.streak=0;}
    updW(real);
    if(checkGrad(real))toast(`「${real.ch}」连续3次正确，已毕业 🎓`);
  }
  data.history.unshift({ch:cur.ch,word:curWord,correct:ok,time:new Date().toISOString()});
  if(data.history.length>300)data.history=data.history.slice(0,300);
  save(data);qR.push(ok);nextQ();
}
function nextQ(){qI++;if(qI>=qQ.length)showSum();else showQ();}

function showSum(){
  document.getElementById('quizSession').style.display='none';
  document.getElementById('quizSummary').style.display='';
  const valid=qR.filter(r=>r!==null);
  const cor=valid.filter(Boolean).length;
  const wr=valid.filter(r=>r===false).length;
  document.getElementById('sumCorrect').textContent=cor;
  document.getElementById('sumWrong').textContent=wr;
  let h='<div style="margin-top:8px;">';
  qQ.forEach((c,i)=>{
    if(qR[i]===null)return;
    const ok=qR[i];
    const w=data.history.find(h=>h.ch===c.ch)?.word||c.ch;
    h+=`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;">
      <span style="font-size:20px;font-family:'ZCOOL XiaoWei',serif;">${c.ch}</span>
      <span style="flex:1;color:var(--ink2);">${w}</span>
      <span class="tag ${ok?'tag-c':'tag-w'}">${ok?'✓ 对':'✗ 错'}</span>
    </div>`;
  });
  h+='</div>';
  document.getElementById('sumDetails').innerHTML=h;
  renderWords();
}
function backToSetup(){
  document.getElementById('quizSummary').style.display='none';
  document.getElementById('quizSetup').style.display='';
}

// ============================================================
//  历史
// ============================================================
function renderHistory(){
  const list=document.getElementById('historyList');
  const empty=document.getElementById('historyEmpty');
  if(!data.history.length){list.innerHTML='';empty.style.display='';return;}
  empty.style.display='none';
  list.innerHTML=data.history.slice(0,100).map(h=>{
    const d=new Date(h.time);
    const ts=`${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    return `<div class="history-item">
      <span class="history-char">${h.ch}</span>
      <span class="history-word">${h.word}<span class="tag ${h.correct?'tag-c':'tag-w'}">${h.correct?'✓ 对':'✗ 错'}</span></span>
      <span class="history-time">${ts}</span>
    </div>`;
  }).join('');
}
function clearHistory(){
  if(!confirm('确认清空所有听写记录吗？'))return;
  data.history=[];save(data);renderHistory();toast('记录已清空');
}

// ============================================================
//  页面 & 工具
// ============================================================
function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  if(name==='history')renderHistory();
  if(name==='words')renderWords();
  if(name==='quiz'){
    const active=data.chars.filter(c=>!c.graduated);
    document.getElementById('quizEmptyHint').style.display=active.length?'none':'';
    document.getElementById('quizSetupCard').style.display=active.length?'':'none';
  }
}
function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);
}
document.getElementById('addModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.getElementById('editModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeEditModal();});
renderWords();
</script>
